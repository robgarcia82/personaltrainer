{id:1,n:"Supino com Halteres",m:"Peitoral maior",s:"Upper A",d:"Seg",f:"Peito",eq:"halter",st:["Deite no banco com um halter em cada mão, pés firmes no chão.","Braços estendidos acima do peito, halteres alinhados com os ombros.","Desça controlando por 2-3s até os cotovelos na altura do peito.","Empurre para cima de forma explosiva.","Mantenha as escápulas retraídas durante todo o movimento."],t:"Imagine que está empurrando o corpo para dentro do banco. Isso ativa mais o peitoral.",e:"Não arquear excessivamente as costas. Manter cotovelos em ~75°.",b1:"3x10-12 | PSE 6-7",b2:"4x8-10 | PSE 7-8",b3:"4x6-8 | PSE 8-9",dl:"2x10-12 | PSE 5-6"},
{id:2,n:"Supino Inclinado c/ Halteres",m:"Peitoral superior",s:"Upper A",d:"Seg",f:"Peito",eq:"halter",st:["Ajuste o banco para 30-45 graus.","Deite com os halteres na altura dos ombros.","Empurre para cima seguindo linha inclinada.","Desça controlando até sentir o alongamento.","Escápulas retraídas no banco."],t:"30° ativa mais peitoral. 45° envolve mais deltóide. Prefira 30°.",e:"Não subir o banco acima de 45°.",b1:"3x10-12 | PSE 6-7",b2:"3x8-10 | PSE 7-8",b3:"3x8-10 | PSE 8",dl:"2x10-12 | PSE 5-6"},
{id:3,n:"Lat Pulldown na Polia",m:"Dorsais, redondo maior, bíceps",s:"Upper A",d:"Seg",f:"Costas",eq:"mc1000",st:["Sente sob a polia alta da MC-1000. Use o pad de apoio.","Segure a barra com pegada pronada, mais larga que os ombros.","Puxe a barra em direção ao peito, cotovelos para baixo e trás.","Aperte as costas no ponto mais baixo por 1s.","Retorne controlando até estender os braços. Sinta o alongamento."],t:"SUBSTITUI O PULLOVER. O exercício que mais faltava. Pense em puxar com os cotovelos, não com as mãos.",e:"Não puxar atrás da cabeça. Não balançar o tronco.",b1:"3x10-12 | PSE 6-7",b2:"4x8-10 | PSE 7-8",b3:"4x6-8 | PSE 8-9",dl:"2x10-12 | PSE 5-6"},
{id:4,n:"Remada c/ Halter (Unilateral)",m:"Dorsais, romboides, trapézio",s:"Upper A",d:"Seg",f:"Costas",eq:"halter",st:["Apoie joelho e mão no banco. Perna oposta no chão.","Segure o halter, braço estendido.","Puxe em direção ao quadril. Cotovelo rente ao corpo.","Aperte as costas no topo por 1s.","Desça controlando."],t:"Pense em puxar com o cotovelo, não com a mão.",e:"Não girar o tronco para subir o peso.",b1:"3x10-12 | PSE 6-7",b2:"3-4x8-10 | PSE 7-8",b3:"4x6-8 | PSE 8-9",dl:"2x10-12 | PSE 5-6"},
{id:5,n:"Face Pull na Polia",m:"Deltóide posterior, rotadores",s:"Upper A",d:"Seg",f:"Ombro",eq:"mc1000",st:["Polia na altura do rosto ou acima.","Segure a corda com pegada neutra.","Puxe em direção ao rosto, abrindo os cotovelos.","Gire as mãos para fora no final — pose de bíceps duplo.","Retorne controlando."],t:"ESSENCIAL. Equilibra o trabalho de empurrar. Previne lesão de ombro. Faça em TODOS os dias de upper.",e:"Não usar peso pesado. Qualidade > carga. Corda vai pro rosto, não pro peito.",b1:"3x12-15 | PSE 6-7",b2:"3x10-12 | PSE 7-8",b3:"3x10-12 | PSE 8",dl:"2x12-15 | PSE 5-6"},
{id:6,n:"Elevação Lateral c/ Halteres",m:"Deltóide lateral",s:"Upper A",d:"Seg",f:"Ombro",eq:"halter",st:["Em pé, halteres ao lado, leve inclinação do tronco.","Levante os braços para os lados até a altura dos ombros.","Cotovelos levemente flexionados e fixos.","Pause 1s no topo.","Desça controlando."],t:"Mindinho mais alto que o polegar no topo.",e:"Não usar impulso. Não subir acima dos ombros.",b1:"3x12-15 | PSE 6-7",b2:"3x10-12 | PSE 7-8",b3:"3x10-12 | PSE 8",dl:"2x12-15 | PSE 5-6"},
{id:7,n:"Rosca Halter Alternada",m:"Bíceps braquial",s:"Upper A",d:"Seg",f:"Braços",eq:"halter",st:["Em pé, halteres ao lado, palmas para frente.","Flexione um braço até o ombro. Cotovelo fixo.","Aperte bíceps 1s no topo.","Desça controlando, repita outro lado.","10 reps = 10 cada lado."],t:"Cotovelo colado ao corpo.",e:"Não balançar o corpo.",b1:"2x12-15 | PSE 6-7",b2:"3x10-12 | PSE 7-8",b3:"3x8-10 | PSE 8",dl:"2x12-15 | PSE 5-6"},
{id:8,n:"Tríceps Pushdown na Polia",m:"Tríceps (3 cabeças)",s:"Upper A",d:"Seg",f:"Braços",eq:"mc1000",st:["Polia no ponto mais alto.","Segure barra reta ou corda, pegada pronada.","Cotovelos colados ao corpo.","Empurre para baixo estendendo completamente.","Retorne controlando até antebraços paralelos ao chão."],t:"SUBSTITUI O MERGULHO NO BANCO. Mais isolamento, sem estresse no ombro. Com corda: gire mãos para fora no final.",e:"Cotovelos não saem da posição. Não inclinar o tronco.",b1:"2x12-15 | PSE 6-7",b2:"3x10-12 | PSE 7-8",b3:"3x8-10 | PSE 8",dl:"2x12-15 | PSE 5-6"},
{id:9,n:"Agachamento Goblet",m:"Quadríceps, glúteos",s:"Lower A",d:"Ter",f:"Pernas",eq:"halter",st:["Halter verticalmente contra o peito.","Pés na largura dos ombros, pontas para fora.","Agache empurrando joelhos para fora, peito erguido.","Desça até coxas paralelas.","Empurre o chão para subir."],t:"Se 24kg ficar leve, segure um halter em cada mão na posição de front squat.",e:"Não deixar joelhos cederem para dentro.",b1:"3x10-12 | PSE 6-7",b2:"3-4x8-10 | PSE 7-8",b3:"4x6-8 | PSE 8-9",dl:"2x10-12 | PSE 5-6"},
{id:10,n:"Agachamento Búlgaro",m:"Quadríceps, glúteos, estabilizadores",s:"Lower A",d:"Ter",f:"Pernas",eq:"halter",st:["De costas para o banco, apoie pé traseiro na borda.","Halter em cada mão ao lado do corpo.","Agache na perna da frente até coxa paralela.","Empurre com a perna da frente.","Complete um lado antes de trocar."],t:"Ajuste a distância do banco até sentir confortável.",e:"Não empurrar com a perna de trás.",b1:"3x10/perna | PSE 6-7",b2:"3-4x8/perna | PSE 7-8",b3:"4x6/perna | PSE 8-9",dl:"2x10/perna | PSE 5-6"},
{id:11,n:"Stiff com Halteres",m:"Isquiotibiais, glúteos",s:"Lower A",d:"Ter",f:"Pernas",eq:"halter",st:["Em pé, halteres à frente das coxas.","Joelhos levemente flexionados e fixos, quadril para trás.","Desça próximo às pernas até alongamento forte.","Pare quando tronco paralelo ao chão.","Volte contraindo glúteos e isquiotibiais."],t:"Foque no alongamento dos isquiotibiais.",e:"Não arredondar as costas.",b1:"3x10-12 | PSE 6-7",b2:"3x8-10 | PSE 7-8",b3:"3x8-10 | PSE 8-9",dl:"2x10-12 | PSE 5-6"},
{id:12,n:"Glute Bridge c/ Sandbag",m:"Glúteos, isquiotibiais",s:"Lower A",d:"Ter",f:"Pernas",eq:"sandbag",st:["Deite, joelhos flexionados, pés apoiados.","Sandbag 20kg sobre o quadril.","Empurre quadril para cima contraindo glúteos.","Aperte 2s no topo.","Desça controlando."],t:"Pés mais perto do glúteo = mais ativação.",e:"Não hiperestender a lombar no topo.",b1:"3x12-15 | PSE 6-7",b2:"3x10-12 | PSE 7-8",b3:"3x10-12 | PSE 8",dl:"2x12-15 | PSE 5-6"},
{id:13,n:"Step Up no Banco",m:"Quadríceps, glúteos",s:"Lower A",d:"Ter",f:"Pernas",eq:"halter",st:["De frente pro banco, halter em cada mão.","Pé inteiro em cima do banco.","Empurre com a perna de cima.","Estenda quadril no topo.","Desça controlando."],t:"Banco na altura do joelho. Mais alto = mais glúteo.",e:"Não dar impulso com a perna de baixo.",b1:"3x10/perna | PSE 6-7",b2:"3x8/perna | PSE 7-8",b3:"3x8/perna | PSE 8",dl:"2x10/perna | PSE 5-6"},
{id:14,n:"Panturrilha em Pé",m:"Gastrocnêmio",s:"Lower A",d:"Ter",f:"Pernas",eq:"halter",st:["Sobre degrau, ponta do pé na borda, halter na mão.","Calcanhar desce — alongamento.","Empurre na ponta do pé.","Aperte 1s no topo.","Desça devagar (3s)."],t:"Amplitude completa > peso.",e:"Não usar impulso. Não dobrar joelho.",b1:"3x15-20 | PSE 6-7",b2:"3x12-15 | PSE 7-8",b3:"3x12-15 | PSE 8",dl:"2x15-20 | PSE 5-6"},
{id:15,n:"Hanging Leg Raise",m:"Core — reto abdominal inferior",s:"Lower A",d:"Ter",f:"Core",eq:"mc1000",st:["Pendure na barra fixa da MC-1000, braços estendidos.","Pernas estendidas, corpo estável.","Levante as pernas até 90°.","Contraía abdômen 1s no topo.","Desça controlando."],t:"SUBSTITUI A PRANCHA. Muito mais efetivo. Se não conseguir pernas retas, comece com joelhos flexionados (knee raise).",e:"Não balançar. Não usar impulso.",b1:"3x8-12 | PSE 6-7",b2:"3x10-15 | PSE 7-8",b3:"3x12-15 | PSE 8",dl:"2x8-12 | PSE 5-6"},
{id:16,n:"Desenvolvimento c/ Halteres",m:"Deltóide anterior e lateral",s:"Upper B",d:"Qui",f:"Ombro",eq:"halter",st:["Sentado a 90°, halteres na altura dos ombros.","Empurre para cima até estender.","Desça controlando.","Cotovelos para os lados e levemente à frente.","Core contraído."],t:"Sentado elimina impulso das pernas.",e:"Não inclinar para trás.",b1:"3x10-12 | PSE 6-7",b2:"3-4x8-10 | PSE 7-8",b3:"4x6-8 | PSE 8-9",dl:"2x10-12 | PSE 5-6"},
{id:17,n:"Arnold Press",m:"Deltóide anterior, lateral, rotadores",s:"Upper B",d:"Qui",f:"Ombro",eq:"halter",st:["Sentado, halteres à frente do rosto, palmas para você.","Ao empurrar, gire palmas para frente no topo.","Estenda braços completamente.","Desça fazendo rotação inversa.","Movimento fluído."],t:"A rotação ativa mais fibras. Menos peso que desenvolvimento.",e:"Não apressar a rotação.",b1:"3x10-12 | PSE 6-7",b2:"3x8-10 | PSE 7-8",b3:"3x8-10 | PSE 8",dl:"2x10-12 | PSE 5-6"},
{id:18,n:"Cable Row (Remada Polia Baixa)",m:"Dorsais, romboides, trapézio",s:"Upper B",d:"Qui",f:"Costas",eq:"mc1000",st:["Polia no ponto mais baixo. Sente com pés no suporte.","Segure puxador, braços estendidos.","Puxe em direção ao abdômen, cotovelos para trás.","Aperte escápulas 1s.","Retorne controlando."],t:"NOVO — tensão constante superior à remada com halter. Tronco reto, sem balançar.",e:"Não inclinar excessivamente para trás. Não arredondar lombar.",b1:"3x10-12 | PSE 6-7",b2:"3-4x8-10 | PSE 7-8",b3:"4x6-8 | PSE 8-9",dl:"2x10-12 | PSE 5-6"},
{id:19,n:"Lat Pulldown Pegada Neutra",m:"Dorsais (inferior), bíceps",s:"Upper B",d:"Qui",f:"Costas",eq:"mc1000",st:["Polia no ponto mais alto.","Pegada neutra (palmas uma para outra).","Puxe em direção ao peito, cotovelos rente ao corpo.","Aperte costas 1s.","Retorne controlando."],t:"Variação do Upper A — pegada diferente ativa mais a parte inferior dos dorsais.",e:"Não usar impulso. Pense nos cotovelos descendo.",b1:"3x10-12 | PSE 6-7",b2:"3x8-10 | PSE 7-8",b3:"3x8-10 | PSE 8",dl:"2x10-12 | PSE 5-6"},
{id:20,n:"Crucifixo com Halteres",m:"Peitoral, deltóide anterior",s:"Upper B",d:"Qui",f:"Peito",eq:"halter",st:["Deite no banco, halteres acima do peito, braços quase estendidos.","Cotovelos flexionados e fixos, abra para os lados.","Desça até alongamento no peitoral.","Traga de volta como se abraçasse uma árvore.","Não bata os halteres no topo."],t:"Menos peso que supino. Foque no alongamento e squeeze.",e:"Não estender braços completamente.",b1:"3x12-15 | PSE 6-7",b2:"3x10-12 | PSE 7-8",b3:"3x10-12 | PSE 8",dl:"2x12-15 | PSE 5-6"},
{id:21,n:"Face Pull na Polia",m:"Deltóide posterior, rotadores",s:"Upper B",d:"Qui",f:"Ombro",eq:"mc1000",st:["Polia na altura do rosto.","Corda com pegada neutra.","Puxe em direção ao rosto, abrindo cotovelos.","Gire mãos para fora no final.","Retorne controlando."],t:"Presente nos 2 dias Upper — saúde do ombro + deltóide posterior.",e:"Qualidade > carga. Sempre.",b1:"3x12-15 | PSE 6-7",b2:"3x10-12 | PSE 7-8",b3:"3x10-12 | PSE 8",dl:"2x12-15 | PSE 5-6"},
{id:22,n:"Cable Curl (Rosca na Polia)",m:"Bíceps braquial",s:"Upper B",d:"Qui",f:"Braços",eq:"mc1000",st:["Polia no ponto mais baixo.","Pegada supinada (palmas para cima).","Cotovelos colados, flexione até os ombros.","Aperte bíceps 1s no topo.","Desça controlando — tensão constante."],t:"NOVO — tensão constante do cabo é superior ao halter para hipertrofia. No halter a tensão cai no topo e no fundo; no cabo ela é constante.",e:"Não balançar. Cotovelos fixos.",b1:"2x12-15 | PSE 6-7",b2:"3x10-12 | PSE 7-8",b3:"3x8-10 | PSE 8",dl:"2x12-15 | PSE 5-6"},
{id:23,n:"Dips nas Paralelas",m:"Tríceps, peitoral inferior",s:"Upper B",d:"Qui",f:"Braços",eq:"mc1000",st:["Segure as barras paralelas, braços estendidos, corpo suspenso.","Incline tronco para frente (mais peito) ou reto (mais tríceps).","Flexione cotovelos descendo até 90°.","Empurre até estender.","Controle todo o movimento."],t:"NOVO — superior ao mergulho no banco. Para progredir: adicione halter entre os pés.",e:"Não descer demais. Não abrir cotovelos.",b1:"3x8-12 | PSE 6-7",b2:"3x8-10 | PSE 7-8",b3:"3x6-8 | PSE 8-9",dl:"2x10-12 | PSE 5-6"},
{id:24,n:"Terra Sumo c/ Halteres",m:"Posterior, glúteos, quad, core",s:"Lower B",d:"Sáb",f:"Pernas",eq:"halter",st:["Pés mais largos que ombros, pontas a 45°.","Halteres entre as pernas.","Agache empurrando joelhos para fora, peito erguido.","Empurre o chão, estendendo quadril e joelhos.","Aperte glúteos no topo."],t:"Pense em empurrar o chão, não puxar o peso.",e:"Não arredondar lombar.",b1:"3x10-12 | PSE 6-7",b2:"3-4x8-10 | PSE 7-8",b3:"4x6-8 | PSE 8-9",dl:"2x10-12 | PSE 5-6"},
{id:25,n:"Stiff Unilateral c/ Halter",m:"Isquiotibiais (unilateral)",s:"Lower B",d:"Sáb",f:"Pernas",eq:"halter",st:["Em pé sobre uma perna, halter na mão oposta.","Incline tronco, perna livre sobe para trás.","Desça até alongamento forte.","Corpo forma linha reta.","Volte contraindo glúteo."],t:"Olhe para ponto fixo no chão para equilíbrio.",e:"Não girar o quadril.",b1:"3x10/perna | PSE 6-7",b2:"3x8/perna | PSE 7-8",b3:"3x8/perna | PSE 8",dl:"2x10/perna | PSE 5-6"},
{id:26,n:"Afundo com Halteres",m:"Quadríceps, glúteos",s:"Lower B",d:"Sáb",f:"Pernas",eq:"halter",st:["Em pé, halter em cada mão.","Passo à frente, agache até joelho traseiro quase no chão.","Ambos os joelhos a 90°.","Empurre com perna da frente.","Alterne ou complete um lado."],t:"Passada longa = mais glúteo. Curta = mais quad.",e:"Não deixar joelho colapsar para dentro.",b1:"3x10/perna | PSE 6-7",b2:"3x8/perna | PSE 7-8",b3:"3x8/perna | PSE 8",dl:"2x10/perna | PSE 5-6"},
{id:27,n:"Cable Pull Through",m:"Glúteos, isquiotibiais",s:"Lower B",d:"Sáb",f:"Pernas",eq:"mc1000",st:["Polia no ponto mais baixo. De costas para a máquina.","Segure corda entre as pernas.","Dê um passo à frente para criar tensão.","Flexione quadril empurrando-o para trás.","Estenda quadril explosivamente, apertando glúteos."],t:"NOVO — excelente para glúteos e posterior. Como um hip thrust em pé. Foco total no squeeze.",e:"Não arredondar costas. Movimento é no quadril.",b1:"3x12-15 | PSE 6-7",b2:"3x10-12 | PSE 7-8",b3:"3x10-12 | PSE 8",dl:"2x12-15 | PSE 5-6"},
{id:28,n:"Goblet Squat c/ Pausa",m:"Quad, core, glúteos",s:"Lower B",d:"Sáb",f:"Pernas",eq:"halter",st:["Halter contra o peito.","Agache até o fundo.","PARE 2-3s. Peito erguido, core contraído.","Sem bounce, empurre para cima.","Pausa elimina reflexo elástico."],t:"Use 20-30% menos peso que no goblet normal.",e:"Não relaxar na posição baixa.",b1:"3x10-12 | PSE 6-7",b2:"3x8-10 | PSE 7-8",b3:"3x8-10 | PSE 8",dl:"2x10-12 | PSE 5-6"},
{id:29,n:"Panturrilha Sentado c/ Halter",m:"Sóleo",s:"Lower B",d:"Sáb",f:"Pernas",eq:"halter",st:["Sente, pontas dos pés em degrau.","Halter sobre joelhos (toalha).","Calcanhares descem.","Empurre na ponta dos pés.","Aperte 1s, desça 3s."],t:"Sentado trabalha o sóleo. Combinar com panturrilha em pé cobre tudo.",e:"Não usar amplitude parcial.",b1:"3x15-20 | PSE 6-7",b2:"3x12-15 | PSE 7-8",b3:"3x12-15 | PSE 8",dl:"2x15-20 | PSE 5-6"},
{id:30,n:"Prancha Lateral",m:"Oblíquos, core lateral",s:"Lower B",d:"Sáb",f:"Core",eq:"corporal",st:["De lado, antebraço no chão, cotovelo sob ombro.","Pés empilhados ou um à frente.","Levante quadril — linha reta.","Contraía core e mantenha.","Troque de lado."],t:"Para dificultar: levante braço livre ou perna de cima.",e:"Não deixar quadril cair.",b1:"3x20-30s/lado",b2:"3x30-40s/lado",b3:"3x40-45s/lado",dl:"2x20-30s/lado"},
{id:31,n:"Pull-Up (Pegada Pronada)",m:"Dorsais, redondo, bíceps",s:"Bônus",d:"Progressão",f:"Costas",eq:"mc1000",st:["Barra fixa, pegada pronada, mais larga que ombros.","Puxe até queixo passar a barra.","Aperte costas 1s.","Desça controlando.","Se não conseguir: faça negativas (só a descida, 5s)."],t:"O rei dos exercícios de costas. Substitua pulldown quando conseguir 3x8. Progressão: negativas → assistido → completo → com peso.",e:"Não usar impulso. Amplitude completa.",b1:"3x máx (ou negativas)",b2:"3x máx",b3:"3x máx (+peso)",dl:"2x máx (leve)"},
{id:32,n:"Chin-Up (Pegada Supinada)",m:"Dorsais, bíceps (mais bíceps)",s:"Bônus",d:"Progressão",f:"Costas",eq:"mc1000",st:["Barra fixa, pegada supinada, largura dos ombros.","Puxe até queixo passar a barra.","Aperte costas e bíceps.","Desça controlando.","Geralmente mais fácil que pull-up."],t:"Mais fácil que pull-up por envolver mais bíceps. Ótima transição. Alterne: uma sessão pull-up, outra chin-up.",e:"Não usar impulso. Amplitude completa.",b1:"3x máx",b2:"3x máx",b3:"3x máx (+peso)",dl:"2x máx (leve)"}
];

function App(){
  const[tab,setTab]=useState("treino");
  const TABS=[
    {id:"treino",label:"Treino",icon:"🏋️"},
    {id:"dieta",label:"Dieta",icon:"🥗"},
    {id:"coach",label:"Coach",icon:"🎯"}
  ];
  return h("div",{style:{minHeight:"100vh",background:"#07070d",color:"#e8e8f0",fontFamily:"'SF Pro Display',system-ui,-apple-system,sans-serif",paddingBottom:64}},
    h("div",{style:{padding:"24px 16px 12px",textAlign:"center",borderBottom:"1px solid #111"}},
      h("div",{style:{fontSize:10,fontWeight:700,letterSpacing:3,color:"#ef4444",textTransform:"uppercase",marginBottom:4}},"Roberto Garcia • Home Gym"),
      h("h1",{style:{fontSize:24,fontWeight:800,letterSpacing:-.5,margin:0,color:"#fff"}},
        tab==="treino"?"Guia de Exercícios":tab==="dieta"?"Plano Nutricional":"Coach de Treino"
      ),
      h("p",{style:{color:"#555",fontSize:11,marginTop:4}},
        tab==="treino"?"MC-1000 + Halteres + Banco + Sandbag":
        tab==="dieta"?"2.200 kcal • 154g prot • 258g carb • 62g gord":
        "12 semanas • 4x/semana • Hipertrofia + Perda de Gordura"
      )
    ),
    tab==="treino"&&h(TreinoView,null),
    tab==="dieta"&&h(DietaView,null),
    tab==="coach"&&h(CoachView,null),
    h("div",{style:{position:"fixed",bottom:0,left:0,right:0,background:"#0d0d14",borderTop:"1px solid #1a1a25",display:"flex",zIndex:300,paddingBottom:"env(safe-area-inset-bottom)"}},
      TABS.map(t=>h("button",{key:t.id,onClick:()=>setTab(t.id),style:{flex:1,padding:"10px 0 8px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,fontFamily:"inherit"}},
        h("span",{style:{fontSize:20,filter:tab===t.id?"none":"grayscale(1) opacity(0.4)"}},t.icon),
        h("span",{style:{fontSize:10,fontWeight:700,color:tab===t.id?"#ef4444":"#444",letterSpacing:.5}},t.label)
      ))
    )
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(h(App));
if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
