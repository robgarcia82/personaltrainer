const h=React.createElement,{useState,useEffect,useRef}=React;

// ── EXERCÍCIOS ────────────────────────────────────────────────────
// Superiores 1 (Seg) — Peito + Tríceps
// Superiores 2 (Ter) — Costas + Bíceps
// Superiores 3 (Qui) — Ombros
// Inferiores  (Sáb) — Pernas + Core
// Bônus       (Progressão) — Pull-ups
const EX=[
// ── SUPERIORES 1 — PEITO + TRÍCEPS ──────────────────────────────
{id:1,n:"Supino com Halteres",m:"Peitoral maior",s:"Superiores 1",d:"Seg",f:"Peito",eq:"halter",
st:["Deite no banco com um halter em cada mão, pés firmes no chão.","Braços estendidos acima do peito, halteres alinhados com os ombros.","Desça controlando por 2-3s até os cotovelos na altura do peito.","Empurre para cima de forma explosiva.","Mantenha as escápulas retraídas durante todo o movimento."],
t:"Imagine que está empurrando o corpo para dentro do banco. Isso ativa mais o peitoral.",
e:"Não arquear excessivamente as costas. Manter cotovelos em ~75°.",
b1:"3x10-12 | PSE 6-7",b2:"4x8-10 | PSE 7-8",b3:"4x6-8 | PSE 8-9",dl:"2x10-12 | PSE 5-6"},

{id:2,n:"Supino Inclinado c/ Halteres",m:"Peitoral superior",s:"Superiores 1",d:"Seg",f:"Peito",eq:"halter",
st:["Ajuste o banco para 30-45 graus.","Deite com os halteres na altura dos ombros.","Empurre para cima seguindo linha inclinada.","Desça controlando até sentir o alongamento.","Escápulas retraídas no banco."],
t:"30° ativa mais peitoral. 45° envolve mais deltóide. Prefira 30°.",
e:"Não subir o banco acima de 45°.",
b1:"3x10-12 | PSE 6-7",b2:"3x8-10 | PSE 7-8",b3:"3x8-10 | PSE 8",dl:"2x10-12 | PSE 5-6"},

{id:3,n:"Voador na Polia",m:"Peitoral — contração constante",s:"Superiores 1",d:"Seg",f:"Peito",eq:"mc1000",
st:["Polia na altura do peito ou levemente acima. Fique de lado para a MC-1000.","Segure o cabo com a mão mais afastada da máquina — cotovelo levemente flexionado e fixo.","Traga o cabo em arco na frente do peito até cruzar levemente a linha central.","Pause 1s na contração máxima — aperte o peitoral.","Retorne controlando em 2-3 segundos. Complete a série e troque o lado."],
t:"A polia mantém tensão máxima exatamente onde o halter perde — na contração. É o único isolamento de peito que carrega o músculo no ponto mais curto. Use peso leve com execução perfeita.",
e:"Não deixar o cotovelo dobrar mais durante o movimento — ele fica fixo. Não usar impulso do tronco. Não subir o braço acima da altura do ombro.",
b1:"3x12-15 | PSE 6-7",b2:"3x10-12 | PSE 7-8",b3:"3x10-12 | PSE 8",dl:"2x12-15 | PSE 5-6"},

{id:4,n:"Dips nas Paralelas",m:"Peitoral inferior + Tríceps",s:"Superiores 1",d:"Seg",f:"Braços",eq:"mc1000",
st:["Segure as barras paralelas da MC-1000, braços estendidos, corpo suspenso.","Incline o tronco para frente (~30°) para ativar mais peitoral inferior.","Flexione os cotovelos descendo até 90°.","Empurre explosivamente até estender.","Controle todo o movimento — não deixe cair."],
t:"Inclinação para frente = mais peito. Tronco reto = mais tríceps. Neste treino, incline para frente. Para progredir: halter entre os pés.",
e:"Não descer abaixo de 90° (estresse excessivo no ombro). Não abrir os cotovelos.",
b1:"3x8-12 | PSE 6-7",b2:"3x8-10 | PSE 7-8",b3:"3x6-8 | PSE 8-9",dl:"2x10-12 | PSE 5-6"},

{id:5,n:"Tríceps Pushdown na Polia",m:"Tríceps — 3 cabeças",s:"Superiores 1",d:"Seg",f:"Braços",eq:"mc1000",
st:["Polia no ponto mais alto da MC-1000.","Segure barra reta ou corda com pegada pronada.","Cotovelos colados ao corpo — não se movem.","Empurre para baixo estendendo completamente.","Retorne controlando até antebraços paralelos ao chão."],
t:"Com corda: gire as mãos para fora no ponto final para maximizar contração. Cotovelos fixos são a chave.",
e:"Cotovelos não saem da posição. Não inclinar o tronco para frente.",
b1:"3x12-15 | PSE 6-7",b2:"3x10-12 | PSE 7-8",b3:"3x8-10 | PSE 8",dl:"2x12-15 | PSE 5-6"},

{id:6,n:"Tríceps Francês c/ Halteres",m:"Tríceps — cabeça longa",s:"Superiores 1",d:"Seg",f:"Braços",eq:"halter",
st:["Deite no banco, halteres acima do peito com braços estendidos — palmas uma para a outra.","Cotovelos fixos apontando para o teto durante todo o movimento.","Dobre os cotovelos abaixando os halteres em direção às orelhas.","Desça até sentir alongamento profundo no tríceps.","Estenda completamente — sem travar os cotovelos."],
t:"A cabeça longa do tríceps (a maior, ~60% do músculo) só é trabalhada quando o braço está elevado. Essencial para braços grandes. Use menos peso que no pushdown.",
e:"Não abrir os cotovelos para os lados — isso tira a tensão do tríceps. Não usar impulso do tronco.",
b1:"3x12-15 | PSE 6-7",b2:"3x10-12 | PSE 7-8",b3:"3x8-10 | PSE 8",dl:"2x12-15 | PSE 5-6"},

// ── SUPERIORES 2 — COSTAS + BÍCEPS ──────────────────────────────
{id:7,n:"Lat Pulldown na Polia",m:"Dorsais, redondo maior, bíceps",s:"Superiores 2",d:"Ter",f:"Costas",eq:"mc1000",
st:["Sente sob a polia alta da MC-1000. Use o pad de apoio de joelhos.","Segure a barra com pegada pronada, mais larga que os ombros.","Puxe a barra em direção ao peito — cotovelos para baixo e para trás.","Aperte as costas no ponto mais baixo por 1s.","Retorne controlando até estender completamente os braços."],
t:"Pense em puxar com os cotovelos, não com as mãos. Incline levemente o tronco para trás no puxão.",
e:"Não puxar atrás da cabeça — lesão de ombro. Não balançar o tronco.",
b1:"3x10-12 | PSE 6-7",b2:"4x8-10 | PSE 7-8",b3:"4x6-8 | PSE 8-9",dl:"2x10-12 | PSE 5-6"},

{id:8,n:"Cable Row — Remada Polia Baixa",m:"Dorsais, romboides, trapézio",s:"Superiores 2",d:"Ter",f:"Costas",eq:"mc1000",
st:["Polia no ponto mais baixo. Sente com os pés no suporte da MC-1000.","Segure o puxador, braços completamente estendidos — sinta o alongamento.","Puxe em direção ao abdômen, cotovelos para trás.","Aperte as escápulas juntas por 1s.","Retorne controlando — permita leve inclinação do tronco à frente."],
t:"Tensão constante é superior à remada com halter para hipertrofia. Tronco permanece reto durante o puxão — não balance.",
e:"Não inclinar excessivamente para trás. Não arredondar a lombar no retorno.",
b1:"3x10-12 | PSE 6-7",b2:"3-4x8-10 | PSE 7-8",b3:"4x6-8 | PSE 8-9",dl:"2x10-12 | PSE 5-6"},

{id:9,n:"Remada c/ Halter (Unilateral)",m:"Dorsais, romboides, trapézio",s:"Superiores 2",d:"Ter",f:"Costas",eq:"halter",
st:["Apoie joelho e mão ipsilaterais no banco. Perna oposta firme no chão.","Segure o halter com braço completamente estendido — sinta o alongamento.","Puxe em direção ao quadril — cotovelo rente ao corpo.","Aperte as costas no topo por 1s.","Desça controlando até extensão total."],
t:"Pense em puxar com o cotovelo, não com a mão. Permite amplitude maior que a remada bilateral.",
e:"Não girar o tronco para subir o peso — isso usa o lombar, não as costas.",
b1:"3x10-12 | PSE 6-7",b2:"3-4x8-10 | PSE 7-8",b3:"4x6-8 | PSE 8-9",dl:"2x10-12 | PSE 5-6"},

{id:10,n:"Straight Arm Pulldown",m:"Dorsais — isolamento sem bíceps",s:"Superiores 2",d:"Ter",f:"Costas",eq:"mc1000",
st:["Polia no ponto mais alto. Use a corda ou barra reta.","Fique em pé a ~60cm da máquina, inclinado levemente para frente — core contraído.","Segure o acessório com os braços quase totalmente estendidos — cotovelos levemente flexionados e fixos.","Puxe em arco para baixo até as mãos chegarem às coxas — sem dobrar os cotovelos.","Aperte as costas 1s no ponto mais baixo. Retorne controlando — braços voltam acima da cabeça."],
t:"Único exercício de costas que elimina o bíceps completamente — trabalha APENAS os dorsais. O alongamento no topo (braços acima da cabeça) é um dos melhores estímulos para hipertrofia de dorsais.",
e:"Não dobrar os cotovelos durante o movimento — se estiver dobrando, o peso está alto demais. Não inclinar o tronco para dar impulso.",
b1:"3x12-15 | PSE 6-7",b2:"3x10-12 | PSE 7-8",b3:"3x10-12 | PSE 8",dl:"2x12-15 | PSE 5-6"},

{id:11,n:"Rosca Halter Alternada",m:"Bíceps braquial",s:"Superiores 2",d:"Ter",f:"Braços",eq:"halter",
st:["Em pé, halteres ao lado do corpo, palmas para frente.","Flexione um braço até o ombro — cotovelo fixo ao lado do corpo.","Aperte o bíceps por 1s no topo.","Desça controlando até extensão total.","10 reps = 10 de cada lado."],
t:"Cotovelo colado ao corpo — não deixe ir para frente. O alternado permite supinação completa de cada braço.",
e:"Não balançar o corpo para dar impulso. Não encurtar a amplitude.",
b1:"3x12-15 | PSE 6-7",b2:"3x10-12 | PSE 7-8",b3:"3x8-10 | PSE 8",dl:"2x12-15 | PSE 5-6"},

{id:12,n:"Cable Curl — Rosca na Polia",m:"Bíceps braquial",s:"Superiores 2",d:"Ter",f:"Braços",eq:"mc1000",
st:["Polia no ponto mais baixo. Fique de frente para a máquina.","Pegada supinada (palmas para cima). Cotovelos colados ao corpo.","Flexione até os halteres chegarem aos ombros.","Aperte o bíceps por 1s no topo.","Desça controlando — sinta a tensão constante durante toda a descida."],
t:"Tensão constante do cabo é superior ao halter para hipertrofia — no halter a tensão cai no topo e no fundo; no cabo ela é uniforme em toda a amplitude.",
e:"Não balançar. Cotovelos fixos — são o pivô do movimento.",
b1:"3x12-15 | PSE 6-7",b2:"3x10-12 | PSE 7-8",b3:"3x8-10 | PSE 8",dl:"2x12-15 | PSE 5-6"},

// ── SUPERIORES 3 — OMBROS ────────────────────────────────────────
{id:13,n:"Desenvolvimento c/ Halteres",m:"Deltóide anterior e lateral",s:"Superiores 3",d:"Qui",f:"Ombro",eq:"halter",
st:["Sentado a 90° no banco, halteres na altura dos ombros.","Cotovelos levemente à frente — não completamente para os lados.","Empurre para cima até quase estender (sem travar).","Desça controlando até a altura das orelhas.","Core contraído durante todo o movimento."],
t:"Sentado elimina o impulso das pernas. Não trave os cotovelos no topo — mantém tensão constante.",
e:"Não inclinar para trás — sobrecarrega lombar. Não descer abaixo das orelhas.",
b1:"3x10-12 | PSE 6-7",b2:"3-4x8-10 | PSE 7-8",b3:"4x6-8 | PSE 8-9",dl:"2x10-12 | PSE 5-6"},

{id:14,n:"Arnold Press",m:"Deltóide completo — 3 cabeças",s:"Superiores 3",d:"Qui",f:"Ombro",eq:"halter",
st:["Sentado, halteres à frente do rosto — palmas voltadas para você.","Ao empurrar para cima, gire as palmas para frente progressivamente.","Estenda os braços completamente com palmas para fora.","Na descida, faça a rotação inversa voltando às palmas para você.","Movimento contínuo e fluido — não pare nas extremidades."],
t:"A rotação recruta as 3 cabeças do deltóide em sequência — muito mais completo que o desenvolvimento tradicional. Use 10-20% menos peso.",
e:"Não apressar a rotação. Controle máximo na descida.",
b1:"3x10-12 | PSE 6-7",b2:"3x8-10 | PSE 7-8",b3:"3x8-10 | PSE 8",dl:"2x10-12 | PSE 5-6"},

{id:15,n:"Elevação Lateral na Polia",m:"Deltóide lateral — isolamento",s:"Superiores 3",d:"Qui",f:"Ombro",eq:"mc1000",
st:["Polia no ponto mais baixo. Fique de lado para a MC-1000.","Segure o cabo com a mão mais afastada da máquina — passe o cabo na frente do corpo se necessário.","Levante o braço em arco lateral até a altura dos ombros — cotovelo levemente flexionado e fixo.","Pause 1s no topo.","Desça controlando devagar — sinta a tensão constante em todo o arco. Complete todas as reps antes de trocar o lado."],
t:"Tensão constante do cabo é superior ao halter — o halter perde tensão no ponto baixo (onde o músculo está em maior desvantagem mecânica), o cabo mantém. Mindinho mais alto que o polegar no topo.",
e:"Não usar impulso. Não subir acima dos ombros — após isso o trapézio assume o movimento.",
b1:"3x12-15 | PSE 6-7",b2:"4x10-12 | PSE 7-8",b3:"4x10-12 | PSE 8",dl:"2x12-15 | PSE 5-6"},

{id:16,n:"Face Pull na Polia",m:"Deltóide posterior, manguito rotador",s:"Superiores 3",d:"Qui",f:"Ombro",eq:"mc1000",
st:["Polia na altura do rosto ou levemente acima.","Segure a corda com pegada neutra (polegar para cima).","Puxe em direção ao rosto abrindo os cotovelos para os lados.","No ponto final, gire as mãos para fora — 'pose de bíceps duplo'.","Retorne controlando — não deixe a carga puxar bruscamente."],
t:"ESSENCIAL para a saúde do ombro. Equilibra todo o volume de empurrar do treino. Priorize qualidade sobre carga — sempre.",
e:"Não usar peso pesado — o objetivo é ativação muscular, não força. A corda vai para o ROSTO, não para o peito.",
b1:"3x15-20 | PSE 6-7",b2:"3x12-15 | PSE 7-8",b3:"3x12-15 | PSE 8",dl:"2x15-20 | PSE 5-6"},

{id:17,n:"Elevação Frontal na Polia",m:"Deltóide anterior — tensão constante",s:"Superiores 3",d:"Qui",f:"Ombro",eq:"mc1000",
st:["Polia no ponto mais baixo. Fique de frente para a MC-1000.","Segure o cabo com uma mão — palma voltada para baixo. Pé contrário ligeiramente à frente para equilíbrio.","Levante o braço à frente em arco até a altura dos ombros — cotovelo levemente flexionado e fixo.","Pause 1s no topo com tensão no cabo.","Desça controlando em 2-3 segundos. Complete a série e troque o lado."],
t:"A polia mantém tensão constante durante todo o arco, especialmente no início (ponto fraco do halter). Use peso menor que no halter — o estímulo é maior.",
e:"Não usar impulso do tronco. Não subir o braço acima dos ombros. Manter o cotovelo fixo durante todo o movimento.",
b1:"3x12-15 | PSE 6-7",b2:"3x10-12 | PSE 7-8",b3:"3x10-12 | PSE 8",dl:"2x12-15 | PSE 5-6"},

{id:18,n:"Crucifixo Invertido na Polia",m:"Deltóide posterior — tensão constante",s:"Superiores 3",d:"Qui",f:"Ombro",eq:"mc1000",
st:["Polia na altura mais alta. Fique de lado ou de frente para a MC-1000.","Segure o cabo com a mão contrária ao lado da polia (cabo cruzado na frente do corpo).","Incline levemente o tronco à frente — core firme, joelhos levemente flexionados.","Puxe o cabo em arco para o lado e para trás até o braço ficar paralelo ao chão — cotovelo levemente flexionado e fixo.","Pause 1s no topo. Desça controlando em 2-3 segundos. Complete a série e troque o lado."],
t:"A polia alta cria tensão constante no deltóide posterior durante todo o arco — superior ao halter inclinado. Peso leve com execução perfeita é mais eficaz.",
e:"Não puxar com o bíceps — o cotovelo deve estar fixo. Não levantar o tronco. Não usar impulso.",
b1:"3x12-15 | PSE 6-7",b2:"3x10-12 | PSE 7-8",b3:"3x10-12 | PSE 8",dl:"2x12-15 | PSE 5-6"},

// ── INFERIORES — PERNAS + CORE ───────────────────────────────────
{id:19,n:"Agachamento Búlgaro",m:"Quadríceps, glúteos, estabilizadores",s:"Inferiores",d:"Sáb",f:"Pernas",eq:"halter",
st:["De costas para o banco, apoie o peito do pé traseiro na borda — não o tornozelo.","Halter em cada mão ao lado do corpo.","Agache na perna da frente até a coxa ficar paralela ao chão.","Joelho da frente alinhado com o pé — não ultrapassa os artelhos.","Empurre com o calcanhar da perna da frente para subir."],
t:"O exercício unilateral mais efetivo para pernas. Ajuste a distância do banco: perto = mais quad, longe = mais glúteo. Complete um lado antes de trocar.",
e:"Não empurrar com a perna de trás. Não deixar o joelho da frente colapsar para dentro.",
b1:"3x10/perna | PSE 6-7",b2:"3-4x8/perna | PSE 7-8",b3:"4x6/perna | PSE 8-9",dl:"2x10/perna | PSE 5-6"},

{id:20,n:"Terra Sumo c/ Halteres",m:"Isquiotibiais, glúteos, quadríceps, core",s:"Inferiores",d:"Sáb",f:"Pernas",eq:"halter",
st:["Pés mais largos que os ombros, pontas dos pés a 45°.","Halteres entre as pernas, segure por fora das coxas.","Agache empurrando os joelhos para fora — peito erguido, lombar neutra.","Empurre o chão para subir, estendendo quadril e joelhos ao mesmo tempo.","Aperte os glúteos no topo."],
t:"Pense em 'empurrar o chão', não em 'puxar o peso'. O sumo permite maior ativação de glúteos que o terra convencional.",
e:"Não arredondar a lombar. Não deixar os joelhos cederem para dentro.",
b1:"3x10-12 | PSE 6-7",b2:"3-4x8-10 | PSE 7-8",b3:"4x6-8 | PSE 8-9",dl:"2x10-12 | PSE 5-6"},

{id:21,n:"Stiff com Halteres",m:"Isquiotibiais, glúteos",s:"Inferiores",d:"Sáb",f:"Pernas",eq:"halter",
st:["Em pé, halteres à frente das coxas — palmas para o corpo.","Joelhos levemente flexionados e FIXOS durante todo o movimento.","Empurre o quadril para trás enquanto o tronco inclina para frente.","Desça próximo às pernas até sentir forte alongamento nos isquiotibiais.","Contraia glúteos e isquiotibiais para retornar — não use as costas."],
t:"O movimento é no QUADRIL, não nas costas. Quanto mais você empurrar o quadril para trás, maior o alongamento dos isquiotibiais.",
e:"Não arredondar as costas — se acontecer, você foi longe demais. Não dobrar mais os joelhos durante a descida.",
b1:"3x10-12 | PSE 6-7",b2:"3x8-10 | PSE 7-8",b3:"3x8-10 | PSE 8-9",dl:"2x10-12 | PSE 5-6"},

{id:22,n:"Glute Bridge c/ Sandbag",m:"Glúteos, isquiotibiais",s:"Inferiores",d:"Sáb",f:"Pernas",eq:"sandbag",
st:["Deite no chão, joelhos flexionados, pés apoiados na largura dos ombros.","Posicione o sandbag de 20kg sobre o quadril — use toalha para conforto.","Empurre o quadril para cima contraindo os glúteos ativamente.","Aperte os glúteos por 2s no topo — não hiperestenda a lombar.","Desça controlando até quase tocar o chão."],
t:"Pés mais perto do glúteo = mais ativação do glúteo. Pés mais longe = mais isquiotibiais. Experimente as duas posições.",
e:"Não hiperestender a lombar no topo — isso é lombar, não glúteo. Não deixar os joelhos cederem para dentro.",
b1:"3x12-15 | PSE 6-7",b2:"3x10-12 | PSE 7-8",b3:"3x10-12 | PSE 8",dl:"2x12-15 | PSE 5-6"},

{id:23,n:"Panturrilha em Pé c/ Halter",m:"Gastrocnêmio",s:"Inferiores",d:"Sáb",f:"Pernas",eq:"halter",
st:["Fique sobre um degrau com as pontas dos pés na borda — calcanhares no ar.","Segure um halter na mão ipsilateral (mesmo lado da perna de trabalho).","Desça o calcanhar o máximo possível — sinta o alongamento.","Empurre na ponta do pé até a contração máxima.","Aperte 1s no topo. Desça em 3 segundos."],
t:"Amplitude completa é mais importante que peso. Cotovelo flexionado ativa o sóleo em vez do gastrocnêmio — mantenha o joelho estendido.",
e:"Não usar impulso. Não dobrar o joelho durante o movimento.",
b1:"4x15-20 | PSE 6-7",b2:"4x12-15 | PSE 7-8",b3:"4x12-15 | PSE 8",dl:"2x15-20 | PSE 5-6"},

{id:24,n:"Hanging Leg Raise",m:"Core — reto abdominal inferior",s:"Inferiores",d:"Sáb",f:"Core",eq:"mc1000",
st:["Pendure na barra fixa da MC-1000 com braços estendidos — pegada pronada.","Contraia o core antes de iniciar — não balance.","Levante as pernas estendidas até 90° (ou joelhos ao peito se iniciante).","Contraia o abdômen por 1s no topo.","Desça controlando — não deixe as pernas cair."],
t:"Versão iniciante: Knee Raise (joelhos ao peito). Versão avançada: L-sit (segura 90° por tempo). Superior à prancha para força real de core.",
e:"Não balançar o corpo para ganhar impulso. Não usar as pernas — o movimento vem do core.",
b1:"3x8-12 | PSE 6-7",b2:"3x10-15 | PSE 7-8",b3:"3x12-15 | PSE 8",dl:"2x8-12 | PSE 5-6"},

// ── BÔNUS — PROGRESSÃO ───────────────────────────────────────────

        return h("div",{key:i,style:{marginBottom:8,background:"#0d0d14",border:"1px solid "+(isOpen?b.cor+"44":"#151520"),borderRadius:14,overflow:"hidden"}},
          h("div",{onClick:()=>setOb(isOpen?null:i),style:{display:"flex",alignItems:"center",gap:12,padding:"14px",cursor:"pointer"}},
            h("div",{style:{width:4,alignSelf:"stretch",borderRadius:2,background:b.cor,flexShrink:0}}),
            h("div",{style:{flex:1}},
              h("div",{style:{fontSize:14,fontWeight:700,color:"#e8e8f0"}},b.nome),
              h("div",{style:{fontSize:11,color:"#555",marginTop:2}},"Semanas ",b.semanas," • PSE ",b.pse)),
            h("span",{style:{color:"#333",fontSize:11,transition:"transform .3s",transform:isOpen?"rotate(180deg)":"none"}},"▼")),
          isOpen&&h("div",{style:{padding:"0 14px 14px",animation:"fadeIn .2s ease"}},
            h("div",{style:{background:"#111118",borderRadius:10,padding:12,marginBottom:8}},
              h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:6}},
                h("span",{style:{fontSize:10,color:"#555"}},"SÉRIES"),
                h("span",{style:{fontSize:13,fontWeight:700,color:b.cor}},b.series)),
              h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:6}},
                h("span",{style:{fontSize:10,color:"#555"}},"REPS"),
                h("span",{style:{fontSize:13,fontWeight:700,color:b.cor}},b.reps)),
              h("div",{style:{display:"flex",justifyContent:"space-between"}},
                h("span",{style:{fontSize:10,color:"#555"}},"PSE"),
                h("span",{style:{fontSize:13,fontWeight:700,color:b.cor}},b.pse))),
            h("p",{style:{fontSize:12.5,color:"#888",lineHeight:1.5,margin:0}},b.foco)))})),
    h("div",{style:{padding:"16px 16px 0"}},
      h("div",{style:{fontSize:10,fontWeight:700,letterSpacing:2,color:"#555",textTransform:"uppercase",marginBottom:10}},"Regras de Progressão"),
      h("div",{style:{background:"#0d0d14",border:"1px solid #151520",borderRadius:14,padding:14}},
        COACH.progressao.map((r,i)=>h("div",{key:i,style:{display:"flex",gap:10,marginBottom:i<COACH.progressao.length-1?10:0}},
          h("div",{style:{width:20,height:20,borderRadius:"50%",background:"#1e40af22",border:"1px solid #1e40af44",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:"#60a5fa",flexShrink:0,marginTop:1}},i+1),
          h("span",{style:{fontSize:13,lineHeight:1.5,color:"#bbb"}},r))))),
    h("div",{style:{padding:"16px 16px 0"}},
      h("div",{style:{fontSize:10,fontWeight:700,letterSpacing:2,color:"#555",textTransform:"uppercase",marginBottom:10}},"Descanso entre Séries"),
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}},
        COACH.descanso.map((d,i)=>h("div",{key:i,style:{background:"#0d0d14",border:"1px solid #151520",borderRadius:12,padding:12}},
          h("div",{style:{fontSize:11,color:"#555",marginBottom:4,lineHeight:1.3}},d.tipo),
          h("div",{style:{fontSize:18,fontWeight:800,color:"#ef4444"}},d.tempo))))),
    h("div",{style:{padding:"16px 16px 0"}},
      h("div",{style:{fontSize:10,fontWeight:700,letterSpacing:2,color:"#555",textTransform:"uppercase",marginBottom:10}},"Progressão Bônus — Pull-Ups"),
      COACH.bonus.map((b,i)=>h("div",{key:i,style:{marginBottom:8,background:"#0d0d14",border:"1px solid #1a1a25",borderRadius:14,padding:14}},
        h("div",{style:{fontSize:14,fontWeight:700,color:"#f472b6",marginBottom:8}},b.nome),
        b.passos.map((p,j)=>h("div",{key:j,style:{display:"flex",gap:8,marginBottom:6}},
          h("div",{style:{width:18,height:18,borderRadius:"50%",background:"#2d0a1e",border:"1px solid #f472b633",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:"#f472b6",flexShrink:0,marginTop:1}},j+1),
          h("span",{style:{fontSize:12.5,color:"#bbb",lineHeight:1.4}},p))),
        h("div",{style:{marginTop:8,background:"#1a1a0a",borderLeft:"3px solid #fbbf24",borderRadius:"0 6px 6px 0",padding:"6px 10px"}},
          h("span",{style:{fontSize:12,color:"#888"}},"💡 ",b.obs)))))
  );
}

function App(){
  const[tab,setTab]=useState("treino");
  const TABS=[
    {id:"treino",label:"Treino",icon:"🏋️"},
    {id:"dieta",label:"Dieta",icon:"🥗"},
    {id:"coach",label:"Coach",icon:"🎯"}
  ];
  const subtitulo={
    treino:"MC-1000 + Halteres + Banco + Sandbag",
    dieta:"2.200 kcal • 154g prot • 258g carb • 62g gord",
    coach:"12 semanas • 4x/semana • Hipertrofia + Perda de Gordura"
  };
  return h("div",{style:{minHeight:"100vh",background:"#07070d",color:"#e8e8f0",fontFamily:"'SF Pro Display',system-ui,-apple-system,sans-serif",paddingBottom:64}},
    h("div",{style:{padding:"24px 16px 12px",textAlign:"center",borderBottom:"1px solid #111"}},
      h("div",{style:{fontSize:10,fontWeight:700,letterSpacing:3,color:"#ef4444",textTransform:"uppercase",marginBottom:4}},"Roberto Garcia • Home Gym"),
      h("h1",{style:{fontSize:24,fontWeight:800,letterSpacing:-.5,margin:0,color:"#fff"}},
        tab==="treino"?"Guia de Exercícios":tab==="dieta"?"Plano Nutricional":"Coach de Treino"),
      h("p",{style:{color:"#555",fontSize:11,marginTop:4}},subtitulo[tab])),
    tab==="treino"&&h(TreinoView,null),
    tab==="dieta"&&h(DietaView,null),
    tab==="coach"&&h(CoachView,null),
    h("div",{style:{position:"fixed",bottom:0,left:0,right:0,background:"#0d0d14",borderTop:"1px solid #1a1a25",display:"flex",zIndex:300,paddingBottom:"env(safe-area-inset-bottom)"}},
      TABS.map(t=>h("button",{key:t.id,onClick:()=>setTab(t.id),style:{flex:1,padding:"10px 0 8px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,fontFamily:"inherit"}},
        h("span",{style:{fontSize:20,filter:tab===t.id?"none":"grayscale(1) opacity(0.4)"}},t.icon),
        h("span",{style:{fontSize:10,fontWeight:700,color:tab===t.id?"#ef4444":"#444",letterSpacing:.5}},t.label))))
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(h(App));
if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
</body>
